<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#ffffff"/>

  <!-- Camera shutter blades using overlapping curved shapes -->
  <clipPath id="bounds">
    <circle cx="16" cy="16" r="13"/>
  </clipPath>

  <g clip-path="url(#bounds)">
    <!-- Dark ring background -->
    <circle cx="16" cy="16" r="13" fill="#1a1a1a"/>

    <!-- Shutter blade gaps - 6 blades with slight rotation -->
    <g fill="#2a2a2a" opacity="0.4">
      <line x1="16" y1="16" x2="16" y2="2" stroke="#333" stroke-width="0.6" transform="rotate(0,16,16)"/>
      <line x1="16" y1="16" x2="16" y2="2" stroke="#333" stroke-width="0.6" transform="rotate(60,16,16)"/>
      <line x1="16" y1="16" x2="16" y2="2" stroke="#333" stroke-width="0.6" transform="rotate(120,16,16)"/>
      <line x1="16" y1="16" x2="16" y2="2" stroke="#333" stroke-width="0.6" transform="rotate(180,16,16)"/>
      <line x1="16" y1="16" x2="16" y2="2" stroke="#333" stroke-width="0.6" transform="rotate(240,16,16)"/>
      <line x1="16" y1="16" x2="16" y2="2" stroke="#333" stroke-width="0.6" transform="rotate(300,16,16)"/>
    </g>

    <!-- Curved blade edges for shutter look -->
    <path d="M16,3 Q22,8 20,16 L16,16 Z" fill="#252525"/>
    <path d="M16,3 Q22,8 20,16 L16,16 Z" fill="#252525" transform="rotate(60,16,16)"/>
    <path d="M16,3 Q22,8 20,16 L16,16 Z" fill="#252525" transform="rotate(120,16,16)"/>
    <path d="M16,3 Q22,8 20,16 L16,16 Z" fill="#252525" transform="rotate(180,16,16)"/>
    <path d="M16,3 Q22,8 20,16 L16,16 Z" fill="#252525" transform="rotate(240,16,16)"/>
    <path d="M16,3 Q22,8 20,16 L16,16 Z" fill="#252525" transform="rotate(300,16,16)"/>
  </g>

  <!-- Inner white circle (lens opening) -->
  <circle cx="16" cy="16" r="5.5" fill="#ffffff"/>

  <!-- Small red H in center -->
  <rect x="12.8" y="12.5" width="1.6" height="7" rx="0.3" fill="#dc2626"/>
  <rect x="17.6" y="12.5" width="1.6" height="7" rx="0.3" fill="#dc2626"/>
  <rect x="12.8" y="15.2" width="6.4" height="1.6" rx="0.3" fill="#dc2626"/>
</svg>
